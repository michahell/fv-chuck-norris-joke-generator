name: release

on:
  push:
    branches: [ 'release' ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
      - run: npm install
      - run: npm run test
      - run: npm run build
      - run: npm set "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
      - run: npm publish
